<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Graduation Invitation - Lê Thị Trường Giang">
    <meta property="og:description" content="Thiệp mời lễ tốt nghiệp của Lê Thị Trường Giang">
    <meta property="og:image" content="https://graduation-yanyan.vercel.app/images/thumbnail.png">
    <meta property="og:url" content="https://graduation-yanyan.vercel.app/invites/tan-phat.html">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Dancing+Script:wght@600&family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="../css/styles.css">
    
    <title>Graduation Invitation</title>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <p class="sub-title">Cột mốc trưởng thành của</p>
            <h2 class="student-name">Trường Giang</h2>
            <h1 class="main-title">Lễ Tốt Nghiệp</h1>
            
            <div class="event-date">
                <span class="date-box">12</span>
                <span class="date-separator">|</span>
                <span class="date-box">04</span>
                <span class="date-separator">|</span>
                <span class="date-box">2026</span>
            </div>

            <div id="countdown">
                <div class="time-box"><span id="days">00</span><p>Ngày</p></div>
                <div class="time-box"><span id="hours">00</span><p>Giờ</p></div>
                <div class="time-box"><span id="minutes">00</span><p>Phút</p></div>
                <div class="time-box"><span id="seconds">00</span><p>Giây</p></div>
            </div>
            
            <a href="../page/invite.html" class="invitation-letter" id="invitePageLink">
                <div class="envelope-wrapper">
                    <div class="envelope">
                        <div class="wax-seal">🎓</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="overlay"></div>
    </section>

    <script src="../js/script.js"></script>
</body>
</html>
